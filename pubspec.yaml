name: transfusio
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons & font
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  google_fonts: ^6.2.1

  # Networking
  retrofit: ^4.4.2
  dio: ^5.7.0
  http: ^1.2.2

  # Log local & remote call api
  pretty_dio_logger: ^1.4.0
  logging: ^1.3.0
  logger: ^2.5.0

  # Security utils
  flutter_dotenv: ^5.2.1

  # Navigation
  go_router: ^14.6.3

  # Injection Dependance
  get_it: ^8.0.3

  # State Management
  get: ^4.6.6

  # Storage
  get_storage: ^2.1.1

  # Firebase & Sign Ext
  firebase_core: ^3.10.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0
  firebase_messaging: ^15.2.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  lottie: ^3.2.0

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Others
  flutter_spinkit: ^5.2.1
  json_annotation: ^4.9.0
  country_code_picker: ^3.1.0
  country_ip: ^3.0.0
  badges: ^3.1.2
  share_plus: ^10.1.4
  shimmer: ^3.0.0
  upgrader: ^10.3.0
  intl: ^0.20.2
  qr_code_scanner_plus: ^2.0.8+1
  qr_flutter: ^4.1.0
  dropdown_search: ^6.0.2
  widgets_to_image: ^1.0.0
  image_gallery_saver_plus: ^4.0.1
  carousel_slider:
  flutter_widget_from_html: ^0.15.3
  flutter_local_notifications:
  animated_text_kit: ^4.2.3
  elegant_nav_bar: ^0.0.22
  another_flushbar:
  dotted_border:

dev_dependencies:
  flutter_test:
    sdk: flutter

  change_app_package_name:
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  retrofit_generator:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/logo_square.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lotties/
    - assets/logos/
    - assets/icons/
    - assets/data/lang.json
    - .env
